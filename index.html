<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Снежный шар</title>
  <style>
    :root {
      --globe-size: min(72vw, 430px);
      --gold: #d7a632;
      --gold-dark: #8f6418;
      --night: #1a2846;
      --snow: #f8fbff;
      --glass: rgba(216, 239, 255, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #f9fbff;
      background:
        radial-gradient(circle at 30% 18%, #385987 0 12%, transparent 32%),
        linear-gradient(145deg, #141b2f 0%, #253c5f 44%, #182033 100%);
    }

    .app {
      width: min(94vw, 760px);
      min-height: min(94vh, 780px);
      display: grid;
      grid-template-rows: 1fr auto;
      justify-items: center;
      align-items: end;
      gap: 20px;
      padding: 34px 16px 28px;
    }

    .scene {
      position: relative;
      width: var(--globe-size);
      height: calc(var(--globe-size) + 150px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .globe-wrap {
      position: relative;
      width: var(--globe-size);
      height: var(--globe-size);
      transform-origin: 50% 100%;
      z-index: 3;
    }

    .globe-wrap.shake {
      animation: globe-jump 1s cubic-bezier(.22, .88, .28, 1);
    }

    .globe {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 50%;
      border: 4px solid rgba(237, 250, 255, 0.72);
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.9) 0 5%, transparent 19%),
        radial-gradient(circle at 64% 70%, rgba(255, 255, 255, 0.18) 0 15%, transparent 38%),
        linear-gradient(180deg, rgba(83, 135, 180, 0.66), rgba(21, 49, 82, 0.92));
      box-shadow:
        inset -24px -28px 48px rgba(4, 13, 26, 0.34),
        inset 18px 18px 40px rgba(255, 255, 255, 0.22),
        0 26px 46px rgba(0, 0, 0, 0.34);
    }

    .globe::before {
      content: "";
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      background: linear-gradient(125deg, rgba(255,255,255,.44), transparent 27% 100%);
      pointer-events: none;
      z-index: 8;
    }

    .ground {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 5%;
      height: 24%;
      border-radius: 50% 50% 0 0;
      background: linear-gradient(180deg, #ffffff, #d9e8f8);
      z-index: 2;
    }

    .drift {
      position: absolute;
      bottom: 13%;
      height: 12%;
      width: 28%;
      border-radius: 50% 50% 30% 30%;
      background: rgba(255, 255, 255, 0.95);
      opacity: 0;
      transform: scaleY(.3);
      transform-origin: 50% 100%;
      transition: opacity 1s ease, transform 10s ease;
      z-index: 6;
    }

    .drift.left {
      left: 13%;
    }

    .drift.right {
      right: 11%;
      width: 34%;
    }

    .drift.center {
      left: 34%;
      bottom: 11%;
      width: 32%;
      height: 10%;
      z-index: 4;
    }

    .drift.front {
      left: 27%;
      bottom: 8%;
      width: 47%;
      height: 9%;
      z-index: 7;
    }

    .snowing .drift,
    .snow-settled .drift {
      opacity: 1;
      transform: scaleY(1);
    }

    .house {
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: 48%;
      height: 42%;
      transform: translateX(-50%) rotateX(0deg);
      transform-style: preserve-3d;
      z-index: 5;
    }

    .roof {
      position: absolute;
      left: 6%;
      top: 7%;
      width: 62%;
      height: 36%;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      background:
        radial-gradient(circle at 20% 54%, #fff4d7 0 5%, transparent 6%),
        radial-gradient(circle at 38% 42%, #e6414c 0 5%, transparent 6%),
        radial-gradient(circle at 58% 53%, #59c8b8 0 5%, transparent 6%),
        radial-gradient(circle at 76% 43%, #fff4d7 0 5%, transparent 6%),
        linear-gradient(145deg, #c94733 0%, #7b231b 78%);
      box-shadow:
        inset -16px -10px 0 rgba(86, 28, 17, .34),
        inset 0 -15px 0 rgba(255, 248, 226, .95),
        8px 9px 0 rgba(62, 25, 12, .24);
      z-index: 4;
    }

    .roof::after {
      content: "";
      position: absolute;
      left: 3%;
      right: 3%;
      bottom: 5%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 248, 226, .96);
      box-shadow: 0 3px 0 rgba(93, 31, 18, .18);
    }

    .roof-side {
      position: absolute;
      left: 55%;
      top: 7%;
      width: 36%;
      height: 36%;
      clip-path: polygon(0 0, 100% 30%, 100% 100%, 0 100%);
      background:
        radial-gradient(circle at 56% 48%, #fff4d7 0 6%, transparent 7%),
        linear-gradient(130deg, #8d2a20 0%, #4d1713 82%);
      box-shadow:
        inset -10px -8px 0 rgba(38, 14, 10, .25),
        inset 0 -13px 0 rgba(241, 235, 211, .78);
      z-index: 3;
    }

    .chimney {
      position: absolute;
      left: 22%;
      top: 0;
      width: 14%;
      height: 29%;
      border: 2px solid rgba(255, 232, 190, .62);
      border-radius: 6px 6px 2px 2px;
      background:
        repeating-linear-gradient(180deg, rgba(255, 235, 195, .24) 0 5px, transparent 5px 10px),
        linear-gradient(100deg, #a44d31 0%, #5a2118 78%);
      box-shadow:
        inset -6px 0 0 rgba(45, 18, 12, .32),
        4px 5px 0 rgba(58, 21, 13, .22),
        0 0 0 2px rgba(65, 22, 14, .24);
      z-index: 6;
    }

    .chimney::before {
      content: "";
      position: absolute;
      left: -18%;
      right: -18%;
      top: -9px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, #fff7dc 0 32%, #b75d37 35% 68%, #552016 70% 100%);
      box-shadow: 0 2px 0 rgba(54, 20, 13, .32);
    }

    .smoke {
      position: absolute;
      left: 13%;
      top: -24%;
      width: 34%;
      height: 35%;
      pointer-events: none;
      z-index: 10;
    }

    .smoke span {
      position: absolute;
      bottom: 0;
      left: var(--sx);
      width: var(--ss);
      height: var(--ss);
      border-radius: 50%;
      background: rgba(255, 255, 255, .78);
      filter: blur(1px);
      animation: smoke-rise 3.2s ease-in-out infinite;
      animation-delay: var(--sd);
    }

    .walls {
      position: absolute;
      left: 11%;
      bottom: 0;
      width: 61%;
      height: 68%;
      border-radius: 10px 10px 4px 4px;
      background:
        radial-gradient(circle at 14% 16%, #ffe8a5 0 4%, transparent 5%),
        radial-gradient(circle at 87% 18%, #f96067 0 4%, transparent 5%),
        linear-gradient(115deg, #b8753f 0%, #7b472a 76%);
      box-shadow:
        inset -12px 0 0 rgba(69, 34, 18, .28),
        inset 0 0 0 3px rgba(73, 39, 22, 0.35),
        8px 9px 0 rgba(45, 22, 13, .22);
      z-index: 3;
    }

    .walls::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 7px 7px 2px 2px;
      border: 3px dashed rgba(255, 246, 220, .82);
      pointer-events: none;
    }

    .side-wall {
      position: absolute;
      right: 9%;
      bottom: 2%;
      width: 28%;
      height: 60%;
      clip-path: polygon(0 7%, 100% 0, 100% 100%, 0 92%);
      border-radius: 0 8px 5px 0;
      background:
        radial-gradient(circle at 70% 28%, #5ac9ba 0 7%, transparent 8%),
        linear-gradient(100deg, #8a4d2d, #57301f);
      box-shadow: inset -12px 0 0 rgba(35, 16, 9, .25);
      z-index: 1;
    }

    .door {
      position: absolute;
      left: 40%;
      bottom: 0;
      width: 21%;
      height: 36%;
      border: 3px solid rgba(255, 235, 187, .76);
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      background:
        radial-gradient(circle at 72% 52%, #f6d45d 0 6%, transparent 7%),
        linear-gradient(100deg, #4e2516, #26120d);
    }

    .window {
      position: absolute;
      top: 37%;
      width: 24%;
      height: 24%;
      overflow: hidden;
      border: 3px solid #fff0c9;
      border-radius: 8px;
      background: #17243b;
      box-shadow: 0 3px 0 rgba(60, 28, 16, .42);
      transition: background .35s ease, box-shadow .35s ease;
    }

    .window.left {
      left: 11%;
    }

    .window.right {
      right: 10%;
    }

    .candy-row {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 39%;
      height: 8px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, #fff5dd 0 9px, #e7404f 9px 18px, #54c5b4 18px 27px);
      box-shadow: 0 2px 0 rgba(55, 27, 15, .28);
    }

    .party .window {
      background: #ffd76a;
      box-shadow: 0 0 22px rgba(255, 216, 111, 0.85);
    }

    .dancers {
      position: absolute;
      inset: 18% 12% 8%;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .party .dancers {
      opacity: 1;
      animation: dance .55s ease-in-out infinite alternate;
    }

    .dancers::before,
    .dancers::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 28%;
      height: 74%;
      border-radius: 999px 999px 3px 3px;
      background: #47213a;
    }

    .dancers::before {
      left: 18%;
    }

    .dancers::after {
      right: 18%;
      background: #1e4e62;
    }

    .flakes {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      z-index: 7;
      pointer-events: none;
    }

    .flake {
      position: absolute;
      top: var(--start-y);
      left: var(--x);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: var(--snow);
      box-shadow: 0 0 8px rgba(255,255,255,.82);
      opacity: 0;
      animation: fall var(--duration) linear forwards;
      animation-delay: var(--delay);
    }

    .spring {
      position: relative;
      width: 32%;
      height: 112px;
      margin-top: -7px;
      z-index: 2;
      transform-origin: 50% 100%;
      border-radius: 50% / 10%;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 235, 154, .28) 31%, transparent 45% 55%, rgba(86, 54, 10, .28) 82%, transparent 100%),
        repeating-linear-gradient(180deg, transparent 0 10px, rgba(255, 222, 105, .95) 11px 17px, rgba(136, 91, 18, .92) 18px 22px, transparent 23px 31px);
      filter: drop-shadow(0 9px 0 rgba(83, 55, 10, .35));
    }

    .spring::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -7px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, #ffe98c 0 34%, #d7a632 36% 61%, #7d5417 63% 100%);
      box-shadow: 0 112px 0 -1px #8b621c;
    }

    .spring::after {
      content: "";
      position: absolute;
      inset: 7px 17%;
      border-radius: 50% / 9%;
      background: linear-gradient(90deg, rgba(255,255,255,.18), transparent 32% 70%, rgba(63, 37, 8, .32));
      border-left: 3px solid rgba(255, 235, 130, .36);
      border-right: 3px solid rgba(74, 47, 10, .34);
      pointer-events: none;
    }

    .spring.compress {
      animation: spring-compress 1s cubic-bezier(.32, .82, .26, 1);
    }

    .base {
      position: relative;
      width: 62%;
      height: 54px;
      margin-top: -10px;
      border-radius: 50% 50% 12px 12px;
      background: linear-gradient(180deg, #f6cf62, #a56e19 64%, #5c3511);
      box-shadow: 0 22px 28px rgba(0,0,0,.34);
      z-index: 1;
    }

    .shake-button {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #12375a;
      background: linear-gradient(180deg, #ffffff, #a9dcff);
      box-shadow: 0 12px 28px rgba(0,0,0,.36), inset 0 0 0 3px rgba(255,255,255,.65);
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease;
    }

    .shake-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .shake-button:disabled {
      cursor: wait;
      opacity: .72;
      transform: none;
    }

    .shake-button svg {
      width: 42px;
      height: 42px;
      stroke-width: 2.4;
    }

    @keyframes globe-jump {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      14% { transform: translateY(8px) scaleY(.98) rotate(-1deg); }
      46% { transform: translateY(calc(var(--globe-size) * -0.5)) rotate(5deg); }
      70% { transform: translateY(calc(var(--globe-size) * -0.18)) rotate(-4deg); }
      86% { transform: translateY(5px) rotate(2deg); }
    }

    @keyframes spring-compress {
      0%, 100% { transform: scaleY(1); }
      16% { transform: scaleY(.45); }
      44% { transform: scaleY(1.2); }
      72% { transform: scaleY(.9); }
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 0;
      }
      10% {
        opacity: var(--flake-opacity);
      }
      28% {
        transform: translate3d(var(--drift-a), calc(var(--dy) * .28), 0);
      }
      54% {
        transform: translate3d(var(--drift-b), calc(var(--dy) * .54), 0);
      }
      78% {
        transform: translate3d(var(--drift-c), calc(var(--dy) * .78), 0);
        opacity: var(--flake-opacity);
      }
      100% {
        transform: translate3d(var(--dx), var(--dy), 0);
        opacity: .18;
      }
    }

    @keyframes dance {
      from { transform: translateX(-5%) rotate(-5deg); }
      to { transform: translateX(5%) rotate(5deg); }
    }

    @keyframes smoke-rise {
      0% {
        transform: translate3d(0, 0, 0) scale(.48);
        opacity: 0;
      }
      18% {
        opacity: .86;
      }
      100% {
        transform: translate3d(var(--smoke-dx), -72px, 0) scale(1.35);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding-top: 20px;
      }

      .scene {
        height: calc(var(--globe-size) + 118px);
      }

      .spring {
        height: 76px;
      }

      .base {
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="scene" aria-label="Снежный шар">
      <div class="globe-wrap" id="globeWrap">
        <div class="globe" id="globe">
          <div class="ground"></div>
          <div class="drift left"></div>
          <div class="drift right"></div>
          <div class="drift center"></div>
          <div class="drift front"></div>
          <div class="house" id="house">
            <div class="smoke" aria-hidden="true">
              <span style="--sx: 8%; --ss: 16px; --sd: 0s; --smoke-dx: -9px;"></span>
              <span style="--sx: 35%; --ss: 21px; --sd: .8s; --smoke-dx: 4px;"></span>
              <span style="--sx: 60%; --ss: 18px; --sd: 1.7s; --smoke-dx: 13px;"></span>
            </div>
            <div class="chimney"></div>
            <div class="roof-side"></div>
            <div class="roof"></div>
            <div class="side-wall"></div>
            <div class="walls">
              <div class="window left"><div class="dancers"></div></div>
              <div class="window right"><div class="dancers"></div></div>
              <div class="candy-row"></div>
              <div class="door"></div>
            </div>
          </div>
          <div class="flakes" id="flakes"></div>
        </div>
      </div>
      <div class="spring" id="spring"></div>
      <div class="base"></div>
    </section>

    <button class="shake-button" id="shakeButton" type="button" aria-label="Встряхнуть снежный шар">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="m12 2 0 20"></path>
        <path d="m4.93 4.93 14.14 14.14"></path>
        <path d="M2 12h20"></path>
        <path d="M4.93 19.07 19.07 4.93"></path>
        <path d="m12 2 3 3"></path>
        <path d="m12 2-3 3"></path>
        <path d="m12 22 3-3"></path>
        <path d="m12 22-3-3"></path>
      </svg>
    </button>
  </main>

  <script>
    const button = document.querySelector("#shakeButton");
    const globeWrap = document.querySelector("#globeWrap");
    const globe = document.querySelector("#globe");
    const spring = document.querySelector("#spring");
    const house = document.querySelector("#house");
    const flakes = document.querySelector("#flakes");

    let audioContext;
    let melodyTimer;
    let isRunning = false;

    const notes = [523.25, 659.25, 783.99, 659.25, 698.46, 783.99, 880, 783.99];

    function playTone(frequency, startTime, duration) {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.08, startTime + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.04);
    }

    function startMelody() {
      audioContext ||= new AudioContext();
      audioContext.resume();
      let index = 0;

      melodyTimer = window.setInterval(() => {
        const now = audioContext.currentTime;
        playTone(notes[index % notes.length], now, 0.24);
        playTone(notes[(index + 2) % notes.length] / 2, now, 0.36);
        index += 1;
      }, 320);
    }

    function stopMelody() {
      window.clearInterval(melodyTimer);
      melodyTimer = undefined;
    }

    function createSnow() {
      flakes.innerHTML = "";

      for (let i = 0; i < 150; i += 1) {
        const flake = document.createElement("span");
        const size = 2.5 + Math.random() * 5.5;
        const x = 8 + Math.random() * 84;
        const startY = `${-34 + Math.random() * 28}%`;
        const duration = `${7.6 + Math.random() * 2.4}s`;
        const delay = `${Math.random() * 2.2}s`;
        const dx = `${-70 + Math.random() * 140}px`;
        const driftA = `${-30 + Math.random() * 60}px`;
        const driftB = `${-46 + Math.random() * 92}px`;
        const driftC = `${-36 + Math.random() * 72}px`;
        const dy = `calc(var(--globe-size) * ${1.08 + Math.random() * 0.18})`;
        const opacity = `${0.58 + Math.random() * 0.38}`;

        flake.className = "flake";
        flake.style.setProperty("--x", `${x}%`);
        flake.style.setProperty("--start-y", startY);
        flake.style.setProperty("--s", `${size}px`);
        flake.style.setProperty("--duration", duration);
        flake.style.setProperty("--delay", delay);
        flake.style.setProperty("--dx", dx);
        flake.style.setProperty("--drift-a", driftA);
        flake.style.setProperty("--drift-b", driftB);
        flake.style.setProperty("--drift-c", driftC);
        flake.style.setProperty("--dy", dy);
        flake.style.setProperty("--flake-opacity", opacity);
        flakes.appendChild(flake);
      }
    }

    function restartAnimation(element, className) {
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
    }

    button.addEventListener("click", () => {
      if (isRunning) return;

      isRunning = true;
      button.disabled = true;
      flakes.innerHTML = "";
      globe.classList.remove("snowing");
      globe.classList.remove("snow-settled");
      house.classList.remove("party");

      restartAnimation(globeWrap, "shake");
      restartAnimation(spring, "compress");

      window.setTimeout(() => {
        createSnow();
        globe.classList.add("snowing");
        house.classList.add("party");
        startMelody();
      }, 1000);

      window.setTimeout(() => {
        stopMelody();
        globe.classList.remove("snowing");
        globe.classList.add("snow-settled");
        house.classList.remove("party");
        flakes.innerHTML = "";
        button.disabled = false;
        isRunning = false;
      }, 11000);
    });
  </script>
</body>
</html>
