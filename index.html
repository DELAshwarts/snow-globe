<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Снежный шар</title>
  <style>
    :root {
      --globe-size: min(74vw, 430px);
      --gold: #e2b449;
      --gold-dark: #8a5b17;
      --glass-blue: rgba(131, 197, 239, .22);
      --snow: #fbfdff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 26% 18%, rgba(103, 151, 206, .55), transparent 30%),
        radial-gradient(circle at 78% 68%, rgba(204, 97, 124, .25), transparent 34%),
        linear-gradient(145deg, #172137 0%, #2f486d 48%, #161d30 100%);
      color: #f8fbff;
    }

    .app {
      width: min(96vw, 760px);
      min-height: min(96vh, 790px);
      display: grid;
      grid-template-rows: 1fr auto;
      justify-items: center;
      align-items: end;
      gap: 18px;
      padding: 26px 14px 28px;
    }

    .scene {
      width: var(--globe-size);
      height: calc(var(--globe-size) + 152px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
    }

    .globe-wrap {
      width: var(--globe-size);
      height: var(--globe-size);
      position: relative;
      z-index: 4;
      transform-origin: 50% 100%;
    }

    .globe-wrap.is-shaking {
      animation: globe-jump 1s cubic-bezier(.2, .82, .28, 1);
    }

    .globe {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 21%, rgba(255, 255, 255, .82) 0 4%, rgba(255, 255, 255, .24) 13%, transparent 27%),
        radial-gradient(circle at 67% 73%, rgba(255, 255, 255, .14), transparent 40%),
        radial-gradient(circle at 50% 50%, var(--glass-blue) 0 58%, rgba(38, 91, 137, .36) 73%, rgba(7, 22, 41, .56) 100%),
        linear-gradient(180deg, rgba(90, 149, 195, .50), rgba(17, 43, 75, .88));
      box-shadow:
        inset 0 0 0 20px rgba(238, 250, 255, .07),
        inset 0 0 46px rgba(236, 250, 255, .18),
        inset -42px -52px 72px rgba(2, 12, 25, .46),
        inset 34px 30px 56px rgba(255, 255, 255, .22),
        0 28px 48px rgba(0, 0, 0, .34);
    }

    .globe::before,
    .globe::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
    }

    .globe::before {
      inset: 4%;
      background:
        radial-gradient(ellipse at 23% 18%, rgba(255, 255, 255, .64) 0 10%, rgba(255, 255, 255, .22) 22%, transparent 38%),
        linear-gradient(132deg, rgba(255, 255, 255, .20), transparent 30%);
    }

    .globe::after {
      inset: 1.5%;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 63%, rgba(255, 255, 255, .16) 71%, rgba(255, 255, 255, .06) 80%, transparent 91%),
        radial-gradient(ellipse at 54% 97%, rgba(4, 16, 30, .38), transparent 42%);
    }

    .ground {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 5%;
      height: 23%;
      border-radius: 50% 50% 0 0;
      background: linear-gradient(180deg, #fff, #dbeaf8);
      z-index: 2;
    }

    .house {
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: 55%;
      height: 47%;
      transform: translateX(-50%);
      z-index: 7;
    }

    .chimney {
      position: absolute;
      left: 40%;
      top: -5%;
      width: 12%;
      height: 24%;
      border-radius: 6px 6px 2px 2px;
      background:
        repeating-linear-gradient(180deg, rgba(255, 229, 190, .22) 0 5px, transparent 5px 10px),
        linear-gradient(100deg, #a44b31, #5a2118);
      box-shadow:
        inset -5px 0 rgba(45, 18, 12, .30),
        4px 5px rgba(58, 21, 13, .20);
      z-index: 8;
    }

    .chimney::before {
      content: "";
      position: absolute;
      left: -18%;
      right: -18%;
      top: -8px;
      height: 11px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, #fff1d6 0 32%, #b75d37 35% 68%, #552016 70%);
    }

    .smoke {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 1px);
      width: 46px;
      height: 64px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .smoke span {
      position: absolute;
      left: var(--sx);
      bottom: -2px;
      width: var(--ss);
      height: var(--ss);
      border-radius: 50%;
      background: rgba(255, 255, 255, .78);
      filter: blur(1px);
      animation: smoke-rise 3.2s ease-in-out infinite;
      animation-delay: var(--sd);
    }

    .roof {
      position: absolute;
      left: 3%;
      top: 0;
      width: 94%;
      height: 45%;
      clip-path: polygon(49% 0, 100% 88%, 7% 92%, 0 72%);
      background:
        radial-gradient(ellipse at 27% 50%, #ffe35d 0 6%, #ef3f52 7% 11%, transparent 12%),
        radial-gradient(ellipse at 44% 38%, #59c8ff 0 5%, #fff0bd 6% 9%, transparent 10%),
        radial-gradient(ellipse at 61% 53%, #ff7b2f 0 6%, #ffe15c 7% 10%, transparent 11%),
        radial-gradient(ellipse at 77% 42%, #cf4ee8 0 5%, #fff0bd 6% 9%, transparent 10%),
        repeating-linear-gradient(34deg, transparent 0 13px, rgba(255, 231, 135, .80) 14px 16px, transparent 17px 29px),
        linear-gradient(112deg, #d94f34 0 42%, #a92f24 43% 62%, #5f1d18 100%);
      box-shadow:
        inset -24px -14px rgba(63, 19, 13, .24),
        inset 22px 10px rgba(255, 149, 99, .16),
        8px 9px rgba(62, 25, 12, .24);
      z-index: 5;
    }

    .roof::before {
      content: "";
      position: absolute;
      left: 3%;
      right: 2%;
      bottom: 3%;
      height: 34%;
      background:
        radial-gradient(ellipse at 8% 20%, #fff7ee 0 8%, transparent 9%),
        radial-gradient(ellipse at 18% 34%, #fff7ee 0 10%, transparent 11%),
        radial-gradient(ellipse at 29% 18%, #fff7ee 0 9%, transparent 10%),
        radial-gradient(ellipse at 41% 41%, #fff7ee 0 11%, transparent 12%),
        radial-gradient(ellipse at 53% 22%, #fff7ee 0 8%, transparent 9%),
        radial-gradient(ellipse at 66% 39%, #fff7ee 0 12%, transparent 13%),
        radial-gradient(ellipse at 79% 18%, #fff7ee 0 9%, transparent 10%),
        radial-gradient(ellipse at 91% 35%, #fff7ee 0 10%, transparent 11%),
        linear-gradient(180deg, #fff9f3 0 42%, transparent 43%);
      clip-path: polygon(0 0, 100% 0, 96% 42%, 90% 28%, 84% 62%, 77% 34%, 70% 74%, 63% 30%, 56% 55%, 48% 36%, 40% 82%, 33% 32%, 27% 58%, 20% 28%, 14% 76%, 8% 35%, 3% 62%);
      filter: drop-shadow(0 3px 1px rgba(93, 31, 18, .22));
    }

    .annex {
      position: absolute;
      left: 7%;
      bottom: 0;
      width: 46%;
      height: 48%;
      border-radius: 10px 10px 5px 5px;
      background: linear-gradient(100deg, #b7653d 0%, #804024 88%);
      box-shadow:
        inset -10px 0 rgba(35, 16, 9, .20),
        5px 7px rgba(45, 22, 13, .18);
      z-index: 3;
    }

    .annex::before {
      content: "";
      position: absolute;
      left: -3%;
      right: -3%;
      top: -10%;
      height: 18%;
      border-radius: 14px 14px 8px 8px;
      background:
        radial-gradient(ellipse at 12% 86%, #fff7ee 0 11%, transparent 12%),
        radial-gradient(ellipse at 31% 86%, #fff7ee 0 15%, transparent 16%),
        radial-gradient(ellipse at 52% 86%, #fff7ee 0 13%, transparent 14%),
        radial-gradient(ellipse at 74% 86%, #fff7ee 0 16%, transparent 17%),
        radial-gradient(ellipse at 91% 86%, #fff7ee 0 12%, transparent 13%),
        linear-gradient(#fff9f2, #fff9f2);
      filter: drop-shadow(0 3px 1px rgba(93, 31, 18, .2));
    }

    .facade {
      position: absolute;
      right: 6%;
      bottom: 0;
      width: 48%;
      height: 72%;
      border-radius: 9px 9px 5px 5px;
      background:
        radial-gradient(circle at 74% 19%, rgba(255, 255, 255, .22) 0 8%, transparent 9%),
        linear-gradient(115deg, #b9663c 0%, #8d4229 62%, #5c281b 100%);
      box-shadow:
        inset -15px 0 rgba(69, 34, 18, .30),
        inset 0 0 0 3px rgba(73, 39, 22, .35),
        8px 9px rgba(45, 22, 13, .22);
      z-index: 4;
    }

    .door {
      position: absolute;
      left: 37%;
      bottom: 0;
      width: 30%;
      height: 43%;
      border-radius: 999px 999px 0 0;
      background:
        radial-gradient(circle at 72% 46%, #ffc85d 0 7%, transparent 8%),
        linear-gradient(100deg, #733021, #36140f);
      box-shadow:
        0 0 0 5px #ffe0a3,
        0 0 0 9px #a7472d,
        inset -8px 0 rgba(44, 16, 11, .25);
    }

    .window,
    .annex-window {
      position: absolute;
      border-radius: 50%;
      background: #17243b;
      border: 5px solid #ffd58e;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, .35),
        0 3px rgba(60, 28, 16, .42);
      transition: background .35s ease, box-shadow .35s ease;
    }

    .window {
      width: 22%;
      height: 20%;
    }

    .window.left {
      left: 12%;
      top: 24%;
    }

    .window.right {
      right: 11%;
      top: 16%;
    }

    .annex-window {
      top: 42%;
      width: 18%;
      height: 20%;
      border-width: 4px;
    }

    .annex-window.left {
      left: 19%;
    }

    .annex-window.right {
      right: 20%;
    }

    .house.is-lit .window {
      background: #ffd76a;
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, .35),
        0 0 20px rgba(255, 216, 111, .85);
    }

    .dancers {
      position: absolute;
      inset: 17% 12% 8%;
      opacity: 0;
      transition: opacity .25s ease;
    }

    .house.is-lit .dancers {
      opacity: 1;
      animation: dance .55s ease-in-out infinite alternate;
    }

    .dancers::before,
    .dancers::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 28%;
      height: 76%;
      border-radius: 999px 999px 3px 3px;
      background: #47213a;
    }

    .dancers::before {
      left: 18%;
    }

    .dancers::after {
      right: 18%;
      background: #1e4e62;
    }

    .snow-pile {
      position: absolute;
      bottom: 9%;
      height: 8%;
      border-radius: 50% 50% 22% 22%;
      background: rgba(255, 255, 255, .96);
      opacity: 0;
      transform: scaleY(.16);
      transform-origin: 50% 100%;
      transition: opacity .7s ease, transform 10s linear;
      z-index: 9;
    }

    .snow-pile.left {
      left: 14%;
      width: 29%;
      bottom: 12%;
    }

    .snow-pile.center {
      left: 30%;
      width: 40%;
      bottom: 10%;
    }

    .snow-pile.right {
      right: 12%;
      width: 32%;
      bottom: 12%;
    }

    .snowing .snow-pile,
    .snow-settled .snow-pile {
      opacity: 1;
      transform: scaleY(1);
    }

    .flakes {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      z-index: 12;
      pointer-events: none;
    }

    .flake {
      position: absolute;
      top: var(--start-y);
      left: var(--x);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: var(--snow);
      box-shadow: 0 0 8px rgba(255, 255, 255, .82);
      opacity: 0;
      animation: fall var(--duration) linear forwards;
      animation-delay: var(--delay);
    }

    .spring {
      width: 32%;
      height: 112px;
      margin-top: -7px;
      position: relative;
      z-index: 2;
      transform-origin: 50% 100%;
      border-radius: 50% / 10%;
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255, 235, 154, .28) 31%, transparent 45% 55%, rgba(86, 54, 10, .28) 82%, transparent 100%),
        repeating-linear-gradient(180deg, transparent 0 10px, rgba(255, 222, 105, .95) 11px 17px, rgba(136, 91, 18, .92) 18px 22px, transparent 23px 31px);
      filter: drop-shadow(0 9px 0 rgba(83, 55, 10, .35));
    }

    .spring::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -7px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, #ffe98c 0 34%, var(--gold) 36% 61%, #7d5417 63%);
      box-shadow: 0 112px 0 -1px var(--gold-dark);
    }

    .spring.is-compressing {
      animation: spring-compress 1s cubic-bezier(.32, .82, .26, 1);
    }

    .base {
      width: 62%;
      height: 54px;
      margin-top: -10px;
      position: relative;
      border-radius: 50% 50% 12px 12px;
      background: linear-gradient(180deg, #f6cf62, #a56e19 64%, #5c3511);
      box-shadow: 0 22px 28px rgba(0, 0, 0, .34);
      z-index: 1;
    }

    .shake-button {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      color: #12375a;
      background: linear-gradient(180deg, #fff, #a9dcff);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .36), inset 0 0 0 3px rgba(255, 255, 255, .65);
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease, opacity .18s ease;
    }

    .shake-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .shake-button:disabled {
      cursor: wait;
      opacity: .70;
      transform: none;
    }

    .shake-button svg {
      width: 42px;
      height: 42px;
      stroke-width: 2.4;
    }

    @keyframes globe-jump {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      14% { transform: translateY(8px) scaleY(.985) rotate(-1deg); }
      46% { transform: translateY(calc(var(--globe-size) * -0.5)) rotate(4deg); }
      70% { transform: translateY(calc(var(--globe-size) * -0.18)) rotate(-3deg); }
      86% { transform: translateY(5px) rotate(1deg); }
    }

    @keyframes spring-compress {
      0%, 100% { transform: scaleY(1); }
      16% { transform: scaleY(.45); }
      44% { transform: scaleY(1.2); }
      72% { transform: scaleY(.9); }
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, 0, 0);
        opacity: 0;
      }
      10% {
        opacity: var(--flake-opacity);
      }
      28% {
        transform: translate3d(var(--drift-a), calc(var(--dy) * .28), 0);
      }
      54% {
        transform: translate3d(var(--drift-b), calc(var(--dy) * .54), 0);
      }
      78% {
        transform: translate3d(var(--drift-c), calc(var(--dy) * .78), 0);
        opacity: var(--flake-opacity);
      }
      100% {
        transform: translate3d(var(--dx), var(--dy), 0);
        opacity: .16;
      }
    }

    @keyframes dance {
      from { transform: translateX(-5%) rotate(-5deg); }
      to { transform: translateX(5%) rotate(5deg); }
    }

    @keyframes smoke-rise {
      0% {
        transform: translate3d(0, 0, 0) scale(.48);
        opacity: 0;
      }
      18% {
        opacity: .82;
      }
      100% {
        transform: translate3d(var(--smoke-dx), -72px, 0) scale(1.35);
        opacity: 0;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding-top: 18px;
      }

      .scene {
        height: calc(var(--globe-size) + 118px);
      }

      .spring {
        height: 76px;
      }

      .spring::before {
        box-shadow: 0 76px 0 -1px var(--gold-dark);
      }

      .base {
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="scene" aria-label="Снежный шар">
      <div class="globe-wrap" id="globeWrap">
        <div class="globe" id="globe">
          <div class="ground"></div>
          <div class="snow-pile left"></div>
          <div class="snow-pile center"></div>
          <div class="snow-pile right"></div>

          <div class="house" id="house">
            <div class="chimney">
              <div class="smoke" aria-hidden="true">
                <span style="--sx: 39%; --ss: 15px; --sd: 0s; --smoke-dx: -5px;"></span>
                <span style="--sx: 32%; --ss: 20px; --sd: .8s; --smoke-dx: 2px;"></span>
                <span style="--sx: 42%; --ss: 17px; --sd: 1.7s; --smoke-dx: 7px;"></span>
              </div>
            </div>
            <div class="roof"></div>
            <div class="annex">
              <div class="annex-window left"></div>
              <div class="annex-window right"></div>
            </div>
            <div class="facade">
              <div class="window left"><div class="dancers"></div></div>
              <div class="window right"><div class="dancers"></div></div>
              <div class="door"></div>
            </div>
          </div>

          <div class="flakes" id="flakes"></div>
        </div>
      </div>
      <div class="spring" id="spring"></div>
      <div class="base"></div>
    </section>

    <button class="shake-button" id="shakeButton" type="button" aria-label="Встряхнуть снежный шар">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        <path d="M12 2v20"></path>
        <path d="M4.93 4.93 19.07 19.07"></path>
        <path d="M2 12h20"></path>
        <path d="M4.93 19.07 19.07 4.93"></path>
        <path d="m12 2 3 3"></path>
        <path d="m12 2-3 3"></path>
        <path d="m12 22 3-3"></path>
        <path d="m12 22-3-3"></path>
      </svg>
    </button>
  </main>

  <script>
    const button = document.querySelector("#shakeButton");
    const globeWrap = document.querySelector("#globeWrap");
    const globe = document.querySelector("#globe");
    const spring = document.querySelector("#spring");
    const house = document.querySelector("#house");
    const flakes = document.querySelector("#flakes");

    const SHAKE_MS = 1000;
    const SNOW_MS = 10000;
    const TOTAL_MS = SHAKE_MS + SNOW_MS;
    const notes = [523.25, 659.25, 783.99, 659.25, 698.46, 783.99, 880, 783.99];

    let audioContext;
    let melodyTimer;
    let isRunning = false;

    function playTone(frequency, startTime, duration) {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.075, startTime + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.04);
    }

    function startMelody() {
      audioContext ||= new AudioContext();
      audioContext.resume();
      let index = 0;

      melodyTimer = window.setInterval(() => {
        const now = audioContext.currentTime;
        playTone(notes[index % notes.length], now, 0.24);
        playTone(notes[(index + 2) % notes.length] / 2, now, 0.36);
        index += 1;
      }, 320);
    }

    function stopMelody() {
      window.clearInterval(melodyTimer);
      melodyTimer = undefined;
    }

    function restartAnimation(element, className) {
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
    }

    function createSnow() {
      flakes.innerHTML = "";

      for (let i = 0; i < 150; i += 1) {
        const flake = document.createElement("span");
        const size = 2.5 + Math.random() * 5.5;
        const x = 8 + Math.random() * 84;
        const startY = `${-34 + Math.random() * 28}%`;
        const duration = `${7.6 + Math.random() * 2.4}s`;
        const delay = `${Math.random() * 2.2}s`;
        const dx = `${-70 + Math.random() * 140}px`;
        const driftA = `${-30 + Math.random() * 60}px`;
        const driftB = `${-46 + Math.random() * 92}px`;
        const driftC = `${-36 + Math.random() * 72}px`;
        const dy = `calc(var(--globe-size) * ${1.08 + Math.random() * 0.18})`;
        const opacity = `${0.58 + Math.random() * 0.38}`;

        flake.className = "flake";
        flake.style.setProperty("--x", `${x}%`);
        flake.style.setProperty("--start-y", startY);
        flake.style.setProperty("--s", `${size}px`);
        flake.style.setProperty("--duration", duration);
        flake.style.setProperty("--delay", delay);
        flake.style.setProperty("--dx", dx);
        flake.style.setProperty("--drift-a", driftA);
        flake.style.setProperty("--drift-b", driftB);
        flake.style.setProperty("--drift-c", driftC);
        flake.style.setProperty("--dy", dy);
        flake.style.setProperty("--flake-opacity", opacity);
        flakes.appendChild(flake);
      }
    }

    button.addEventListener("click", () => {
      if (isRunning) return;

      isRunning = true;
      button.disabled = true;
      flakes.innerHTML = "";
      globe.classList.remove("snowing", "snow-settled");
      house.classList.remove("is-lit");

      restartAnimation(globeWrap, "is-shaking");
      restartAnimation(spring, "is-compressing");

      window.setTimeout(() => {
        createSnow();
        globe.classList.add("snowing");
        house.classList.add("is-lit");
        startMelody();
      }, SHAKE_MS);

      window.setTimeout(() => {
        stopMelody();
        flakes.innerHTML = "";
        globe.classList.remove("snowing");
        globe.classList.add("snow-settled");
        house.classList.remove("is-lit");
        button.disabled = false;
        isRunning = false;
      }, TOTAL_MS);
    });
  </script>
</body>
</html>
